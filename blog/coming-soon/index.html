<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style.css">
        <title>Coming Soon | Aileen Abril Castro</title>
    </head>
    <body>
        <nav class="blog-nav">
            <a href="/blog/" class="blog-nav-name">Aileen Abril Castro</a>
        </nav>

        <div class="coming-soon">
            <img src="../images/mayan-hug.PNG" alt="Mayan animals sculpture of them hugging" class="coming-soon-img">
            <p class="coming-soon-text"></p>
            <a href="/blog/" class="coming-soon-back">← Back to blog</a>
        </div>

        <script>
            const messages = [
                "Coming soon...",
                "Working on it...",
                "OOps...",
                "In the works..."
            ];
            const random = messages[Math.floor(Math.random() * messages.length)];
            document.querySelector(".coming-soon-text").textContent = random;
        </script>
    </body>
</html>
